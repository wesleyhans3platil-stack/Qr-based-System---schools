# ──────────────────────────────────────────────────────────────────
# ALTERNATIVE: Traditional VPS (if Railway costs too much)
# ──────────────────────────────────────────────────────────────────
#
# ──────────────────────────────────────────────────────────────────
# MySQL (my.ini / my.cnf)
# ──────────────────────────────────────────────────────────────────
#
# [mysqld]
# max_connections         = 500       # Must exceed 800 PHP workers (persistent reuse helps)
# innodb_buffer_pool_size = 2G        # Use ~50% of server RAM (minimum 1G)
# innodb_log_file_size    = 256M      # Larger redo log = fewer disk writes
# innodb_flush_log_at_trx_commit = 2  # Flush once/sec instead of every commit (10x faster writes)
# innodb_flush_method     = O_DIRECT  # Avoid double-buffering on Linux
# query_cache_type        = 0         # Disable for write-heavy (attendance inserts)
# tmp_table_size          = 64M
# max_heap_table_size     = 64M
# table_open_cache        = 400
# thread_cache_size       = 50        # Reuse threads instead of creating new ones
# key_buffer_size         = 32M
#
# ──────────────────────────────────────────────────────────────────
# PHP (php.ini)
# ──────────────────────────────────────────────────────────────────
#
# max_execution_time  = 30            # Enough for scan + DB write
# memory_limit        = 128M          # Scanner API uses very little
# max_input_time      = 30
# post_max_size       = 2M            # QR scan payload is tiny
# upload_max_filesize = 2M
# mysqli.allow_persistent  = On       # CRITICAL: enable persistent connections
# mysqli.max_persistent    = 500      # Match MySQL max_connections
# mysqli.max_links         = 500
# opcache.enable           = 1        # CRITICAL: cache compiled PHP bytecode
# opcache.memory_consumption = 128
# opcache.max_accelerated_files = 4000
# opcache.revalidate_freq  = 60       # Check file changes every 60s (production)
#
# ──────────────────────────────────────────────────────────────────
# Apache (httpd.conf) — for 800 concurrent connections
# ──────────────────────────────────────────────────────────────────
#
# If using mpm_prefork (XAMPP default):
#   <IfModule mpm_prefork_module>
#       StartServers          50
#       MinSpareServers       25
#       MaxSpareServers       75
#       MaxRequestWorkers     800
#       MaxConnectionsPerChild 10000
#   </IfModule>
#
# If using mpm_worker (recommended for production):
#   <IfModule mpm_worker_module>
#       StartServers          8
#       MinSpareThreads       75
#       MaxSpareThreads       250
#       ThreadLimit           64
#       ThreadsPerChild       25
#       MaxRequestWorkers     800
#       MaxConnectionsPerChild 10000
#   </IfModule>
#
# KeepAlive On
# MaxKeepAliveRequests 100
# KeepAliveTimeout 5
#
# ──────────────────────────────────────────────────────────────────
# MINIMUM SERVER REQUIREMENTS for 800 concurrent scanners
# ──────────────────────────────────────────────────────────────────
#
# CPU:  4 vCPU (8 recommended)
# RAM:  8 GB minimum (16 GB recommended)
# Disk: SSD required (not HDD) — critical for InnoDB performance
# OS:   Ubuntu 22.04+ or AlmaLinux 9 (not shared hosting)
#
