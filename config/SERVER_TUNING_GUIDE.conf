# ──────────────────────────────────────────────────────────────────
# RAILWAY.APP SETUP
# ──────────────────────────────────────────────────────────────────
#
# 1. Create a new project on Railway
# 2. Add a MySQL service (Railway plugin)
# 3. Deploy PHP app from GitHub repo
# 4. Railway auto-provides these env vars (code reads them automatically):
#      MYSQLHOST, MYSQLPORT, MYSQLUSER, MYSQLPASSWORD, MYSQLDATABASE
#      — OR —
#      MYSQL_URL (connection string format)
#
# 5. Set PHP service to use at least:
#      - 4 vCPU / 4 GB RAM (scale up to 8/8 during peak if needed)
#
# 6. Set MySQL service to at least:
#      - 2 vCPU / 4 GB RAM
#
# 7. Pick the region closest to Philippines:
#      asia-southeast1 (Singapore) is the best choice
#
# ──────────────────────────────────────────────────────────────────
