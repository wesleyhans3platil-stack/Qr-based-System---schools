<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>QR Attendance Dashboard</title>
  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 0; padding: 16px; background: #f6f8fb; color: #111; }
    header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    header h1 { margin: 0; font-size: 1.4rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(220px,1fr)); gap: 16px; }
    .card { background: #fff; border-radius: 12px; box-shadow: 0 1px 8px rgba(0,0,0,0.06); padding: 18px; }
    .card h2 { margin: 0 0 8px; font-size: 1.2rem; }
    .card .value { font-size: 2.2rem; font-weight: 700; color: #0b3d91; }
    .small { font-size: 0.85rem; color: #555; }
    #status { font-size: 0.9rem; color: #666; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>QR Attendance Dashboard</h1>
      <div id="status">Loading…</div>
    </div>
    <div>
      <label>
        Refresh interval:
        <select id="intervalSelect">
          <option value="5000">5s</option>
          <option value="2000">2s</option>
          <option value="1000" selected>1s</option>
          <option value="0">Off</option>
        </select>
      </label>
    </div>
  </header>

  <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:24px;align-items:flex-end;">
    <div>
      <label style="font-weight:600;">School</label>
      <select id="schoolSelect" style="margin-left:8px;padding:6px 10px;border-radius:8px;border:1px solid #ccc;"></select>
    </div>
    <div>
      <label style="font-weight:600;">Date</label>
      <input id="dateInput" type="date" style="margin-left:8px;padding:6px 10px;border-radius:8px;border:1px solid #ccc;" />
    </div>
    <div style="margin-left:auto;">
      <label>
        Refresh:
        <select id="intervalSelect" style="margin-left:8px;padding:6px 10px;border-radius:8px;border:1px solid #ccc;">
          <option value="5000">5s</option>
          <option value="2000">2s</option>
          <option value="1000" selected>1s</option>
          <option value="0">Off</option>
        </select>
      </label>
    </div>
  </div>

  <div class="grid">
    <div class="card">
      <h2>Schools</h2>
      <div id="statSchools" class="value">—</div>
      <div class="small">Total active schools</div>
    </div>
    <div class="card">
      <h2>Students Present</h2>
      <div id="statStudents" class="value">—</div>
      <div class="small">Students checked in today</div>
    </div>
    <div class="card">
      <h2>Students Absent</h2>
      <div id="statAbsent" class="value">—</div>
      <div class="small">Estimated absent (active)</div>
    </div>
    <div class="card">
      <h2>Teachers Present</h2>
      <div id="statTeachers" class="value">—</div>
      <div class="small">Teachers checked in</div>
    </div>
  </div>

  <div id="breakdownContainer" style="margin-top:24px;"></div>
  <div id="flaggedContainer" style="margin-top:24px;"></div>
  <div id="inactiveContainer" style="margin-top:24px;"></div>

  <script src="dashboard.js"></script>
</body>
</html>
